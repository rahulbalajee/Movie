# Bitnami Kafka in KRaft mode (no Zookeeper).
# Single combined controller+broker, plaintext listeners, no auth — dev only.

# Bitnami moved free images to bitnamilegacy/* in Aug 2025.
image:
  repository: bitnamilegacy/kafka

controller:
  replicaCount: 1
  persistence:
    enabled: false

broker:
  replicaCount: 0

listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT
  external:
    protocol: PLAINTEXT
